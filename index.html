<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>五行局 · Elemental Relations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; -webkit-tap-highlight-color: transparent; }
    button { -webkit-appearance: none; font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const ELEMENTS = ["wood", "fire", "earth", "metal", "water"];
    const EL_CN = { wood: "木", fire: "火", earth: "土", metal: "金", water: "水" };
    const EL_EMOJI = { wood: "🌳", fire: "🔥", earth: "⛰️", metal: "⚔️", water: "🌊" };
    const EL_COLOR = {
      wood: "#1B5E20", fire: "#B71C1C", earth: "#795548", metal: "#37474F", water: "#0D47A1"
    };
    const EL_BG = {
      wood: "#C8E6C9", fire: "#FFCDD2", earth: "#D7CCC8", metal: "#CFD8DC", water: "#BBDEFB"
    };

    const SHENG = { wood: "fire", fire: "earth", earth: "metal", metal: "water", water: "wood" };
    const KE = { wood: "earth", fire: "metal", earth: "water", metal: "wood", water: "fire" };
    const KE_BY = {};
    Object.entries(KE).forEach(([k, v]) => { KE_BY[v] = k; });
    const SHENG_BY = {};
    Object.entries(SHENG).forEach(([k, v]) => { SHENG_BY[v] = k; });

    const SEASONS = [
      { name: "春 Spring", el: "wood", boost: "wood", nerf: "metal" },
      { name: "夏 Summer", el: "fire", boost: "fire", nerf: "water" },
      { name: "长夏 Late Summer", el: "earth", boost: "earth", nerf: "wood" },
      { name: "秋 Autumn", el: "metal", boost: "metal", nerf: "fire" },
      { name: "冬 Winter", el: "water", boost: "water", nerf: "earth" },
    ];

    const CHARACTERS = [
      { id: 1, tg: "甲木", en: "Towering Tree", el: "wood", yy: "yang", str: "strong" },
      { id: 2, tg: "甲木", en: "Young Sapling", el: "wood", yy: "yang", str: "weak" },
      { id: 3, tg: "乙木", en: "Wild Vine", el: "wood", yy: "yin", str: "strong" },
      { id: 4, tg: "乙木", en: "Orchid", el: "wood", yy: "yin", str: "weak" },
      { id: 5, tg: "丙火", en: "Blazing Sun", el: "fire", yy: "yang", str: "strong" },
      { id: 6, tg: "丙火", en: "Winter Sun", el: "fire", yy: "yang", str: "weak" },
      { id: 7, tg: "丁火", en: "Forge Flame", el: "fire", yy: "yin", str: "strong" },
      { id: 8, tg: "丁火", en: "Starlight", el: "fire", yy: "yin", str: "weak" },
      { id: 9, tg: "戊土", en: "Great Mountain", el: "earth", yy: "yang", str: "strong" },
      { id: 10, tg: "戊土", en: "Crumbling Wall", el: "earth", yy: "yang", str: "weak" },
      { id: 11, tg: "己土", en: "Fertile Plain", el: "earth", yy: "yin", str: "strong" },
      { id: 12, tg: "己土", en: "Scattered Dust", el: "earth", yy: "yin", str: "weak" },
      { id: 13, tg: "庚金", en: "War Blade", el: "metal", yy: "yang", str: "strong" },
      { id: 14, tg: "庚金", en: "Rusty Iron", el: "metal", yy: "yang", str: "weak" },
      { id: 15, tg: "辛金", en: "Diamond", el: "metal", yy: "yin", str: "strong" },
      { id: 16, tg: "辛金", en: "Gold Leaf", el: "metal", yy: "yin", str: "weak" },
      { id: 17, tg: "壬水", en: "Raging River", el: "water", yy: "yang", str: "strong" },
      { id: 18, tg: "壬水", en: "Quiet Stream", el: "water", yy: "yang", str: "weak" },
      { id: 19, tg: "癸水", en: "Dark Rain", el: "water", yy: "yin", str: "strong" },
      { id: 20, tg: "癸水", en: "Morning Dew", el: "water", yy: "yin", str: "weak" },
    ];

    const OBJECTIVES = [
      { id: "dominance", cn: "称霸", en: "Dominance", desc: "本元素≥10", check: (p) => p.elements[p.char.el] >= 10 },
      { id: "balance", cn: "平衡", en: "Balance", desc: "全部3-6", check: (p) => ELEMENTS.every(e => p.elements[e] >= 3 && p.elements[e] <= 6) },
      { id: "survivor", cn: "幸存者", en: "Survivor", desc: "总值最高且无0", check: (p, all) => {
        const myTotal = Object.values(p.elements).reduce((a, b) => a + b, 0);
        const noZero = ELEMENTS.every(e => p.elements[e] > 0);
        const maxTotal = Math.max(...all.map(q => Object.values(q.elements).reduce((a, b) => a + b, 0)));
        return noZero && myTotal >= maxTotal;
      }},
      { id: "destroyer", cn: "毁灭者", en: "Destroyer", desc: "两人崩溃", check: (p, all) => {
        const others = all.filter(q => q.id !== p.id);
        return others.filter(q => ELEMENTS.some(e => q.elements[e] <= 0)).length >= 2;
      }},
    ];

    function initElements(el, str) {
      const vals = {};
      ELEMENTS.forEach(e => {
        if (e === el) vals[e] = str === "strong" ? 5 : 3;
        else if (SHENG_BY[el] === e) vals[e] = 3;
        else if (SHENG[el] === e) vals[e] = 2;
        else if (KE_BY[el] === e) vals[e] = 1;
        else if (KE[el] === e) vals[e] = 2;
        else vals[e] = 2;
      });
      return vals;
    }

    function buildDeck() {
      const cards = [];
      Object.entries(SHENG).forEach(([from, to]) => {
        cards.push({ type: "sheng", from, to, cn: `${EL_CN[from]}生${EL_CN[to]}`, effect: `${EL_CN[to]}+2` });
        cards.push({ type: "sheng", from, to, cn: `${EL_CN[from]}生${EL_CN[to]}`, effect: `${EL_CN[to]}+2` });
      });
      Object.entries(KE).forEach(([from, to]) => {
        cards.push({ type: "ke", from, to, cn: `${EL_CN[from]}克${EL_CN[to]}`, effect: `${EL_CN[to]}-2` });
        cards.push({ type: "ke", from, to, cn: `${EL_CN[from]}克${EL_CN[to]}`, effect: `${EL_CN[to]}-2` });
      });
      return shuffle(cards);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const TYPE_COLORS = {
      sheng: { bg: "#1B5E20", text: "#C8E6C9", label: "生", en: "GEN" },
      ke: { bg: "#B71C1C", text: "#FFCDD2", label: "克", en: "ATK" },
    };

    function Game() {
      const [screen, setScreen] = useState("title");
      const [players, setPlayers] = useState([]);
      const [deck, setDeck] = useState([]);
      const [round, setRound] = useState(0);
      const [season, setSeason] = useState(0);
      const [phase, setPhase] = useState("draw");
      const [selectedCard, setSelectedCard] = useState(null);
      const [selectedTarget, setSelectedTarget] = useState(null);
      const [log, setLog] = useState([]);
      const [revealData, setRevealData] = useState(null);
      const [winner, setWinner] = useState(null);
      const [schemeTimer, setSchemeTimer] = useState(30);
      const timerRef = useRef(null);

      const playerIdx = 0;
      const me = players[playerIdx];

      function startGame(charId) {
        const myChar = CHARACTERS.find(c => c.id === charId);
        const otherChars = shuffle(CHARACTERS.filter(c => c.id !== charId)).slice(0, 2);
        const allChars = [myChar, ...otherChars];
        const objectives = shuffle([...OBJECTIVES]);
        const newDeck = buildDeck();
        const newPlayers = allChars.map((ch, i) => ({
          id: i, name: i === 0 ? "你" : [`小明`, `小红`][i - 1],
          char: ch, elements: initElements(ch.el, ch.str),
          hand: [newDeck.pop(), newDeck.pop(), newDeck.pop()],
          objective: objectives[i], isAI: i !== 0, collapsed: {},
        }));
        setPlayers(newPlayers);
        setDeck(newDeck);
        setRound(1);
        setSeason(0);
        setPhase("draw");
        setLog(["🎮 游戏开始！第1回合"]);
        setSelectedCard(null);
        setSelectedTarget(null);
        setRevealData(null);
        setWinner(null);
        setScreen("game");
      }

      function drawPhase() {
        const newDeck = [...deck];
        const newPlayers = players.map(p => {
          if (newDeck.length > 0) {
            const card = newDeck.pop();
            return { ...p, hand: [...p.hand, card] };
          }
          return p;
        });
        const s = SEASONS[season];
        newPlayers.forEach(p => {
          p.elements = { ...p.elements };
          p.elements[s.boost] = Math.min(10, p.elements[s.boost] + 1);
          p.elements[s.nerf] = Math.max(0, p.elements[s.nerf] - 1);
        });
        setDeck(newDeck);
        setPlayers(newPlayers);
        setLog(prev => [...prev, `📥 摸牌完成 | ${s.name} ${EL_CN[s.boost]}+1 ${EL_CN[s.nerf]}-1`]);
        setPhase("scheme");
        setSchemeTimer(30);
      }

      useEffect(() => {
        if (phase === "scheme" && schemeTimer > 0) {
          timerRef.current = setTimeout(() => setSchemeTimer(t => t - 1), 1000);
          return () => clearTimeout(timerRef.current);
        }
        if (phase === "scheme" && schemeTimer <= 0) {
          setPhase("commit");
        }
      }, [phase, schemeTimer]);

      function commitCard() {
        if (!selectedCard || selectedTarget === null) return;
        const aiMoves = players.filter(p => p.isAI).map(p => {
          const card = pickRandom(p.hand);
          const targets = players.filter(q => q.id !== p.id);
          const target = pickRandom(targets);
          return { playerId: p.id, card, targetId: target.id };
        });
        const allMoves = [
          { playerId: 0, card: me.hand[selectedCard], targetId: selectedTarget },
          ...aiMoves
        ];
        setRevealData(allMoves);
        setPhase("reveal");
      }

      function resolveRound() {
        if (!revealData) return;
        const newPlayers = players.map(p => ({
          ...p, elements: { ...p.elements }, hand: [...p.hand]
        }));
        const newLog = [];
        const destiny = round > 5;
        const mult = destiny ? 2 : 1;

        revealData.forEach(move => {
          const p = newPlayers[move.playerId];
          const cardIdx = p.hand.findIndex(c => c === move.card);
          if (cardIdx !== -1) p.hand.splice(cardIdx, 1);
        });

        const shengMoves = revealData.filter(m => m.card.type === "sheng");
        const keMoves = revealData.filter(m => m.card.type === "ke");

        shengMoves.forEach(m => {
          const target = newPlayers[m.targetId];
          const el = m.card.to;
          const amt = 2 * mult;
          target.elements[el] = Math.min(12, target.elements[el] + amt);
          newLog.push(`${EL_EMOJI[m.card.from]} ${newPlayers[m.playerId].name} 生 ${target.name} → ${EL_CN[el]}+${amt}`);
        });

        keMoves.forEach(m => {
          const target = newPlayers[m.targetId];
          const el = m.card.to;
          const amt = 2 * mult;
          target.elements[el] = Math.max(0, target.elements[el] - amt);
          newLog.push(`⚔️ ${newPlayers[m.playerId].name} 克 ${target.name} → ${EL_CN[el]}-${amt}`);
        });

        let w = null;
        newPlayers.forEach(p => {
          if (p.objective.check(p, newPlayers)) {
            w = p;
            newLog.push(`🏆 ${p.name} 达成「${p.objective.cn}」！`);
          }
        });

        newPlayers.forEach(p => {
          ELEMENTS.forEach(e => {
            if (p.elements[e] >= 8) newLog.push(`⚠️ ${p.name} ${EL_CN[e]}过旺(${p.elements[e]})`);
            if (p.elements[e] <= 0) newLog.push(`💥 ${p.name} ${EL_CN[e]}崩溃!`);
          });
        });

        setPlayers(newPlayers);
        setLog(prev => [...prev, `── 第${round}回合结算 ──`, ...newLog]);
        setRevealData(null);
        setSelectedCard(null);
        setSelectedTarget(null);

        if (w) {
          setWinner(w);
          setPhase("end");
        } else if (round >= 8) {
          const totals = newPlayers.map(p => ({ ...p, total: Object.values(p.elements).reduce((a, b) => a + b, 0) }));
          totals.sort((a, b) => b.total - a.total);
          setWinner(totals[0]);
          setLog(prev => [...prev, `⏰ 8回合结束！${totals[0].name}总值最高获胜！`]);
          setPhase("end");
        } else {
          setRound(r => r + 1);
          setSeason(s => (s + 1) % 5);
          setPhase("draw");
        }
      }

      const elBar = (el, val, max = 10) => {
        const pct = Math.min(100, (val / max) * 100);
        return (
          <div key={el} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
            <span style={{ fontSize: 11, width: 18, textAlign: "center" }}>{EL_CN[el]}</span>
            <div style={{ flex: 1, height: 14, background: "#1a1a2e", borderRadius: 7, overflow: "hidden", position: "relative" }}>
              <div style={{
                width: `${pct}%`, height: "100%", borderRadius: 7,
                background: val >= 8 ? "#ff6b6b" : val <= 1 ? "#555" : EL_COLOR[el],
                transition: "width 0.4s"
              }} />
              <span style={{ position: "absolute", right: 4, top: 0, fontSize: 10, color: "#fff", lineHeight: "14px" }}>{val}</span>
            </div>
          </div>
        );
      };

      // ─── TITLE SCREEN ───
      if (screen === "title") {
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%)", color: "#fff", fontFamily: "'Noto Sans SC', 'Helvetica Neue', sans-serif", padding: "0", overflow: "auto" }}>
            <div style={{ textAlign: "center", paddingTop: 60 }}>
              <div style={{ fontSize: 48, fontWeight: 700, letterSpacing: 8, marginBottom: 4 }}>{"五行局"}</div>
              <div style={{ fontSize: 14, color: "#888", letterSpacing: 4, marginBottom: 40 }}>ELEMENTAL RELATIONS</div>
              <div style={{ fontSize: 13, color: "#aaa", marginBottom: 30 }}>{"选择你的日主元素"}</div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 10, padding: "0 16px", maxWidth: 400, margin: "0 auto" }}>
              {CHARACTERS.slice(0, 10).map(ch => (
                <button key={ch.id} onClick={() => startGame(ch.id)}
                  style={{
                    width: "calc(50% - 5px)", padding: "12px 8px", borderRadius: 12,
                    background: `linear-gradient(135deg, ${EL_COLOR[ch.el]}cc, ${EL_COLOR[ch.el]}88)`,
                    border: "1px solid rgba(255,255,255,0.1)", color: "#fff", cursor: "pointer",
                    textAlign: "left", transition: "transform 0.15s",
                  }}
                  onMouseDown={e => e.currentTarget.style.transform = "scale(0.96)"}
                  onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
                >
                  <div style={{ fontSize: 18, fontWeight: 600 }}>{ch.tg}</div>
                  <div style={{ fontSize: 11, opacity: 0.7 }}>{ch.en}</div>
                  <div style={{ fontSize: 10, opacity: 0.5, marginTop: 2 }}>
                    {ch.yy === "yang" ? "☀ 阳" : "☽ 阴"} | {ch.str === "strong" ? "身强" : "身弱"}
                  </div>
                </button>
              ))}
            </div>
            <div style={{ textAlign: "center", marginTop: 20, paddingBottom: 40 }}>
              <div style={{ fontSize: 11, color: "#555" }}>3人局 | 你 vs 2个AI对手</div>
            </div>
          </div>
        );
      }

      // ─── GAME SCREEN ───
      if (screen === "game" && me) {
        const s = SEASONS[season];
        const destiny = round > 5;

        return (
          <div style={{ minHeight: "100vh", background: "#0a0a1a", color: "#fff", fontFamily: "'Noto Sans SC', 'Helvetica Neue', sans-serif", paddingBottom: 120 }}>

            {/* TOP BAR */}
            <div style={{ background: "rgba(255,255,255,0.04)", padding: "8px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <div>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{"第"}{round}{"回合"}</span>
                {destiny && <span style={{ fontSize: 10, color: "#ff6b6b", marginLeft: 6 }}>{"天命×2"}</span>}
              </div>
              <div style={{ fontSize: 11, color: EL_BG[s.el], background: EL_COLOR[s.el] + "44", padding: "2px 10px", borderRadius: 10 }}>
                {s.name}
              </div>
              <div style={{ fontSize: 11, color: "#888" }}>{"牌堆"}{deck.length}</div>
            </div>

            {/* PHASE BANNER */}
            <div style={{ textAlign: "center", padding: "10px 0 6px" }}>
              {phase === "draw" && <button onClick={drawPhase} style={{ background: "#2196F3", color: "#fff", border: "none", borderRadius: 20, padding: "10px 32px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>{"📥 摸牌"}</button>}
              {phase === "scheme" && (
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#F39C12" }}>{"🗣️ 密谋阶段"}</div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: schemeTimer <= 10 ? "#ff6b6b" : "#fff", marginTop: 4 }}>{schemeTimer}s</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{"观察对手状态，计划你的行动"}</div>
                  <button onClick={() => { clearTimeout(timerRef.current); setPhase("commit"); }}
                    style={{ marginTop: 8, background: "#333", color: "#fff", border: "1px solid #555", borderRadius: 16, padding: "6px 20px", fontSize: 12, cursor: "pointer" }}>
                    {"跳过 → 出牌"}
                  </button>
                </div>
              )}
              {phase === "commit" && <div style={{ fontSize: 16, fontWeight: 600, color: "#4CAF50" }}>{"🎯 选牌 + 选目标"}</div>}
              {phase === "reveal" && (
                <div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "#E91E63", marginBottom: 8 }}>{"🃏 翻牌！"}</div>
                  {revealData && revealData.map((m, i) => (
                    <div key={i} style={{ fontSize: 12, color: "#ccc", marginBottom: 3 }}>
                      <span style={{ color: TYPE_COLORS[m.card.type].text }}>{players[m.playerId].name}</span>
                      {" → "}{m.card.cn}{" → "}{players[m.targetId].name}
                    </div>
                  ))}
                  <button onClick={resolveRound} style={{ marginTop: 10, background: "#E91E63", color: "#fff", border: "none", borderRadius: 20, padding: "10px 32px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>{"⚔️ 结算"}</button>
                </div>
              )}
              {phase === "end" && winner && (
                <div style={{ padding: 20 }}>
                  <div style={{ fontSize: 40 }}>{"🏆"}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#FFD700", marginTop: 8 }}>
                    {winner.name === "你" ? "你赢了！" : `${winner.name}获胜！`}
                  </div>
                  <div style={{ fontSize: 13, color: "#aaa", marginTop: 4 }}>{"目标："}{winner.objective.cn} - {winner.objective.desc}</div>
                  <button onClick={() => setScreen("title")} style={{ marginTop: 16, background: "#333", color: "#fff", border: "1px solid #555", borderRadius: 20, padding: "10px 28px", fontSize: 13, cursor: "pointer" }}>{"再来一局"}</button>
                </div>
              )}
            </div>

            {/* OPPONENTS */}
            <div style={{ display: "flex", gap: 8, padding: "6px 12px", overflowX: "auto" }}>
              {players.filter(p => p.isAI).map(p => (
                <div key={p.id} style={{ flex: "0 0 calc(50% - 4px)", background: "rgba(255,255,255,0.04)", borderRadius: 12, padding: "8px 10px", border: `1px solid ${EL_COLOR[p.char.el]}33` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: EL_BG[p.char.el] }}>{p.name}</span>
                    <span style={{ fontSize: 10, color: "#888" }}>{p.char.tg}</span>
                  </div>
                  <div style={{ fontSize: 10, color: "#666", marginBottom: 4 }}>{p.char.en} | {"手牌"}{p.hand.length}</div>
                  {ELEMENTS.map(e => elBar(e, p.elements[e]))}
                </div>
              ))}
            </div>

            {/* MY STATUS */}
            <div style={{ margin: "8px 12px", background: `linear-gradient(135deg, ${EL_COLOR[me.char.el]}22, rgba(255,255,255,0.03))`, borderRadius: 14, padding: "10px 12px", border: `1px solid ${EL_COLOR[me.char.el]}44` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div>
                  <span style={{ fontSize: 16, fontWeight: 700, color: EL_BG[me.char.el] }}>{me.char.tg}</span>
                  <span style={{ fontSize: 11, color: "#888", marginLeft: 6 }}>{me.char.en}</span>
                </div>
                <div style={{ fontSize: 10, padding: "2px 8px", borderRadius: 8, background: "rgba(255,215,0,0.15)", color: "#FFD700" }}>
                  {"目标："}{me.objective.cn}
                </div>
              </div>
              <div style={{ fontSize: 10, color: "#888", marginBottom: 6 }}>{me.objective.desc}</div>
              {ELEMENTS.map(e => elBar(e, me.elements[e]))}
            </div>

            {/* MY HAND */}
            {phase === "commit" && (
              <div style={{ padding: "6px 12px" }}>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>{"你的手牌（点击选择）"}</div>
                <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                  {me.hand.map((card, i) => {
                    const tc = TYPE_COLORS[card.type];
                    const sel = selectedCard === i;
                    return (
                      <button key={i} onClick={() => setSelectedCard(sel ? null : i)}
                        style={{
                          flex: "0 0 90px", padding: "10px 6px", borderRadius: 10,
                          background: sel ? tc.bg : tc.bg + "66",
                          border: sel ? "2px solid #FFD700" : `1px solid ${tc.bg}88`,
                          color: tc.text, cursor: "pointer", textAlign: "center",
                          transform: sel ? "translateY(-4px)" : "none", transition: "all 0.15s",
                        }}>
                        <div style={{ fontSize: 18, fontWeight: 700 }}>{tc.label}</div>
                        <div style={{ fontSize: 10, marginTop: 2 }}>{card.cn}</div>
                        <div style={{ fontSize: 9, opacity: 0.6, marginTop: 2 }}>{card.effect}</div>
                      </button>
                    );
                  })}
                </div>

                {selectedCard !== null && (
                  <div style={{ marginTop: 8 }}>
                    <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>{"选择目标"}</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {players.filter(p => p.id !== 0).map(p => {
                        const sel = selectedTarget === p.id;
                        return (
                          <button key={p.id} onClick={() => setSelectedTarget(sel ? null : p.id)}
                            style={{
                              flex: 1, padding: "10px", borderRadius: 10, cursor: "pointer",
                              background: sel ? EL_COLOR[p.char.el] : "rgba(255,255,255,0.05)",
                              border: sel ? "2px solid #FFD700" : "1px solid rgba(255,255,255,0.1)",
                              color: "#fff", textAlign: "center",
                            }}>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{p.name}</div>
                            <div style={{ fontSize: 10, opacity: 0.6 }}>{p.char.tg}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {selectedCard !== null && selectedTarget !== null && (
                  <button onClick={commitCard}
                    style={{
                      width: "100%", marginTop: 12, padding: "14px", borderRadius: 14,
                      background: "linear-gradient(135deg, #E91E63, #9C27B0)", border: "none",
                      color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer",
                      letterSpacing: 2,
                    }}>
                    {"🃏 出牌！"}
                  </button>
                )}
              </div>
            )}

            {/* LOG */}
            <div style={{ margin: "8px 12px", background: "rgba(255,255,255,0.02)", borderRadius: 12, padding: "8px 10px", maxHeight: 150, overflowY: "auto" }}>
              <div style={{ fontSize: 11, color: "#555", marginBottom: 4 }}>{"战报"}</div>
              {log.slice(-8).map((l, i) => (
                <div key={i} style={{ fontSize: 11, color: l.includes("🏆") ? "#FFD700" : l.includes("⚠") ? "#ff6b6b" : l.includes("💥") ? "#ff4444" : "#999", marginBottom: 2 }}>{l}</div>
              ))}
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Game />);
  </script>
</body>
</html>
